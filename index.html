<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lygiagrečios ir Statmenos Tiesės – Testas</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #16161f;
    --card: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #2d2d3d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 60%);
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease both;
  }

  header .label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  header h1 {
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }

  /* Timer */
  .timer-bar-wrap {
    width: 100%;
    max-width: 680px;
    margin-bottom: 20px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .timer-info {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  #timer-display {
    color: var(--accent2);
    font-weight: 700;
    font-size: 16px;
  }

  .timer-track {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  #timer-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 1s linear, background 1s;
  }

  /* Progress */
  .progress-row {
    width: 100%;
    max-width: 680px;
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
    animation: fadeDown 0.6s 0.15s ease both;
  }

  .prog-dot {
    flex: 1;
    height: 4px;
    border-radius: 99px;
    background: var(--border);
    transition: background 0.4s;
  }

  .prog-dot.done { background: var(--accent); }
  .prog-dot.current { background: var(--accent2); }

  /* Card */
  .card {
    width: 100%;
    max-width: 680px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 20px 20px 0 0;
  }

  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .q-text {
    font-size: clamp(15px, 3vw, 18px);
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 24px;
    color: #f1f5f9;
  }

  .q-text .highlight {
    font-family: 'Space Mono', monospace;
    color: var(--accent2);
    font-size: 0.95em;
  }

  /* Answer options */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media (max-width: 480px) {
    .options { grid-template-columns: 1fr; }
  }

  .opt-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(6,182,212,0.08);
    transform: translateY(-2px);
  }

  .opt-btn.correct {
    border-color: var(--correct);
    background: rgba(16,185,129,0.15);
    color: #6ee7b7;
  }

  .opt-btn.wrong {
    border-color: var(--wrong);
    background: rgba(239,68,68,0.15);
    color: #fca5a5;
  }

  .opt-btn.reveal {
    border-color: var(--correct);
    background: rgba(16,185,129,0.08);
    color: #6ee7b7;
  }

  .opt-btn:disabled { cursor: default; }

  /* Feedback */
  .feedback {
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    border-left: 4px solid;
  }

  .feedback.correct {
    background: rgba(16,185,129,0.1);
    border-color: var(--correct);
    color: #a7f3d0;
    display: block;
  }

  .feedback.wrong {
    background: rgba(239,68,68,0.1);
    border-color: var(--wrong);
    color: #fecaca;
    display: block;
  }

  /* Next btn */
  #next-btn {
    margin-top: 20px;
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    display: none;
    transition: opacity 0.2s, transform 0.2s;
  }

  #next-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  /* Score screen */
  #score-screen {
    display: none;
    width: 100%;
    max-width: 680px;
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .score-ring {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: conic-gradient(var(--accent) var(--pct), var(--border) 0);
    position: relative;
  }

  .score-ring::after {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    background: var(--card);
  }

  .score-inner {
    position: relative;
    z-index: 2;
    text-align: center;
  }

  .score-num {
    font-size: 36px;
    font-weight: 800;
    color: #fff;
    font-family: 'Space Mono', monospace;
  }

  .score-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .score-title {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .score-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .results-list {
    text-align: left;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .result-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .result-row:last-child { border-bottom: none; }

  .result-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }

  .result-q { color: var(--muted); margin-bottom: 4px; }
  .result-a { font-family: 'Space Mono', monospace; font-size: 12px; }
  .result-a .correct-ans { color: var(--correct); }
  .result-a .your-ans { color: var(--wrong); }

  #retry-btn {
    padding: 16px 40px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
  }

  #retry-btn:hover { opacity: 0.9; transform: translateY(-2px); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="label">Matematikos Testas</div>
  <h1>Lygiagrečios &amp; Statmenos Tiesės</h1>
</header>

<div class="timer-bar-wrap" id="timer-wrap">
  <div class="timer-info">
    <span>Laikas</span>
    <span id="timer-display">10:00</span>
  </div>
  <div class="timer-track"><div id="timer-bar"></div></div>
</div>

<div class="progress-row" id="progress-row"></div>

<div class="card" id="quiz-card">
  <div class="q-num" id="q-num"></div>
  <div class="q-text" id="q-text"></div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <button id="next-btn">Kitas klausimas →</button>
</div>

<div id="score-screen">
  <div class="score-ring" id="score-ring">
    <div class="score-inner">
      <div class="score-num" id="score-num"></div>
      <div class="score-label">teisingai</div>
    </div>
  </div>
  <div class="score-title" id="score-title"></div>
  <div class="score-sub" id="score-sub"></div>
  <div class="results-list" id="results-list"></div>
  <button id="retry-btn">🔄 Bandyti dar kartą</button>
</div>

<script>
const questions = [
  {
    q: "Tiesė L turi gradientą <span class='highlight'>3/5</span>. Koks yra bet kurios tiesės, lygiagrečios L, gradientas?",
    opts: ["3/5", "−5/3", "5/3", "−3/5"],
    correct: 0,
    explain: "Lygiagrečios tiesės turi <b>vienodus</b> gradientus. Todėl gradientas = 3/5."
  },
  {
    q: "Tiesė L turi gradientą <span class='highlight'>2/5</span>. Koks yra bet kurios tiesės, statmenos L, gradientas?",
    opts: ["2/5", "5/2", "−5/2", "−2/5"],
    correct: 2,
    explain: "Statmenų tiesių gradientai – neigiami atvirkštiniai: apversk trupmeną → 5/2, pakeisk ženklą → <b>−5/2</b>. Tikrinimas: 2/5 × (−5/2) = −1 ✓"
  },
  {
    q: "Rask gradientą tiesės, statmenos tiessei su gradientu <span class='highlight'>−3</span>:",
    opts: ["3", "−1/3", "1/3", "−3"],
    correct: 2,
    explain: "m = −3 = −3/1. Atvirkštinis → −1/3. Pakeisk ženklą → <b>1/3</b>. Tikrinimas: −3 × 1/3 = −1 ✓"
  },
  {
    q: "Tiesė M turi gradientą <span class='highlight'>6</span>. Koks yra gradientas tiesės, statmenos M?",
    opts: ["6", "−6", "1/6", "−1/6"],
    correct: 3,
    explain: "m = 6. Atvirkštinis → 1/6. Pakeisk ženklą → <b>−1/6</b>. Tikrinimas: 6 × (−1/6) = −1 ✓"
  },
  {
    q: "Ar tiesės su gradientais <span class='highlight'>4</span> ir <span class='highlight'>−1/4</span> yra statmenos?",
    opts: ["Taip", "Ne", "Tik jei kertasi", "Neįmanoma pasakyti"],
    correct: 0,
    explain: "Patikriname: 4 × (−1/4) = −1. Kadangi sandauga = −1, tiesės yra <b>statmenos</b> ✓"
  },
  {
    q: "Taškai A(1, 4) ir B(3, 8). Koks yra tiesės [AB] gradientas?",
    opts: ["1/2", "2", "−2", "4"],
    correct: 1,
    explain: "m = (8−4)/(3−1) = 4/2 = <b>2</b>"
  },
  {
    q: "Tiesė [AB] turi gradientą <span class='highlight'>2</span>. Koks yra gradientas tiesės, statmenos [AB]?",
    opts: ["2", "−2", "1/2", "−1/2"],
    correct: 3,
    explain: "Statmena: apversk → 1/2, pakeisk ženklą → <b>−1/2</b>. Tikrinimas: 2 × (−1/2) = −1 ✓"
  },
  {
    q: "Duoti taškai A(−2, 4) ir B(4, 8). Koks gradientas tiesės, lygiagrečios [AB]?",
    opts: ["2/3", "−3/2", "3/2", "−2/3"],
    correct: 0,
    explain: "m[AB] = (8−4)/(4−(−2)) = 4/6 = <b>2/3</b>. Lygiagreti tiesė turi tą patį gradientą."
  },
  {
    q: "Tiesė turi gradientą <span class='highlight'>0</span>. Koks yra statmenos tiesės gradientas?",
    opts: ["0", "1", "−1", "Neapibrėžtas"],
    correct: 3,
    explain: "Tiesė su gradientu 0 yra horizontali. Jai statmena tiesė yra vertikali, o vertikalios tiesės gradientas yra <b>neapibrėžtas</b>."
  },
  {
    q: "Rask <span class='highlight'>a</span>, jei tiesė per A(3, 2) ir B(−1, a) yra lygiagreti tiessei su gradientu <span class='highlight'>−1</span>:",
    opts: ["a = 6", "a = −2", "a = 2", "a = −6"],
    correct: 0,
    explain: "Lygiagreti → gradientas = −1. Todėl (a−2)/(−1−3) = −1 → (a−2)/(−4) = −1 → a−2 = 4 → <b>a = 6</b>"
  }
];

let current = 0, score = 0, answered = false;
let userAnswers = [];
let timerInterval, secondsLeft = 600;

function fmt(s) {
  const m = Math.floor(s/60).toString().padStart(2,'0');
  const sec = (s%60).toString().padStart(2,'0');
  return m+':'+sec;
}

function startTimer() {
  const bar = document.getElementById('timer-bar');
  const display = document.getElementById('timer-display');
  timerInterval = setInterval(() => {
    secondsLeft--;
    display.textContent = fmt(secondsLeft);
    const pct = (secondsLeft/600)*100;
    bar.style.width = pct+'%';
    if (pct < 30) bar.style.background = 'linear-gradient(90deg,#ef4444,#f97316)';
    else if (pct < 60) bar.style.background = 'linear-gradient(90deg,#f59e0b,#06b6d4)';
    if (secondsLeft <= 0) { clearInterval(timerInterval); showScore(); }
  }, 1000);
}

function buildProgress() {
  const row = document.getElementById('progress-row');
  row.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'prog-dot' + (i < current ? ' done' : i === current ? ' current' : '');
    row.appendChild(d);
  });
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('q-num').textContent = `Klausimas ${current+1} / ${questions.length}`;
  document.getElementById('q-text').innerHTML = q.q;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    opts.appendChild(btn);
  });
  buildProgress();

  // re-animate card
  const card = document.getElementById('quiz-card');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = 'fadeUp 0.4s ease both'; });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.opt-btn');
  const fb = document.getElementById('feedback');
  userAnswers[current] = idx;

  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.correct) b.classList.add('correct');
    else if (i === idx && idx !== q.correct) b.classList.add('wrong');
  });

  if (idx === q.correct) {
    score++;
    fb.className = 'feedback correct';
    fb.innerHTML = '✓ Teisingai! ' + q.explain;
  } else {
    fb.className = 'feedback wrong';
    fb.innerHTML = '✗ Neteisingai. ' + q.explain;
  }
  fb.style.display = 'block';
  document.getElementById('next-btn').style.display = 'block';
}

document.getElementById('next-btn').onclick = () => {
  current++;
  if (current >= questions.length) showScore();
  else loadQuestion();
};

function showScore() {
  clearInterval(timerInterval);
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('timer-wrap').style.display = 'none';
  document.getElementById('progress-row').style.display = 'none';

  const ss = document.getElementById('score-screen');
  ss.style.display = 'block';

  const pct = Math.round((score/questions.length)*100);
  document.getElementById('score-num').textContent = `${score}/${questions.length}`;
  document.getElementById('score-ring').style.setProperty('--pct', pct*3.6+'deg');

  let title, sub;
  if (pct >= 90) { title = '🏆 Puikiai!'; sub = 'Teorija įsisavinta pavyzdingai!'; }
  else if (pct >= 70) { title = '👍 Gerai!'; sub = 'Dar šiek tiek praktikos ir bus tobula.'; }
  else if (pct >= 50) { title = '📚 Pavyko iš dalies'; sub = 'Rekomenduojama pakartoti taisykles.'; }
  else { title = '💡 Reikia pasikartoti'; sub = 'Peržiūrėk lygiagrečių ir statmenų taisykles.'; }

  document.getElementById('score-title').textContent = title;
  document.getElementById('score-sub').textContent = sub;

  const list = document.getElementById('results-list');
  list.innerHTML = '';
  questions.forEach((q, i) => {
    const ua = userAnswers[i];
    const correct = ua === q.correct;
    const row = document.createElement('div');
    row.className = 'result-row';
    const shortQ = q.q.replace(/<[^>]+>/g,'');
    row.innerHTML = `
      <span class="result-icon">${correct ? '✅' : '❌'}</span>
      <div>
        <div class="result-q">${i+1}. ${shortQ.substring(0,70)}...</div>
        <div class="result-a">
          ${!correct ? `<span class="your-ans">Tavo: ${ua !== undefined ? q.opts[ua] : '—'} &nbsp;</span>` : ''}
          <span class="correct-ans">Teisingas: ${q.opts[q.correct]}</span>
        </div>
      </div>`;
    list.appendChild(row);
  });
}

document.getElementById('retry-btn').onclick = () => {
  current = 0; score = 0; answered = false; userAnswers = [];
  secondsLeft = 600;
  document.getElementById('timer-bar').style.width = '100%';
  document.getElementById('timer-bar').style.background = 'linear-gradient(90deg,var(--accent),var(--accent2))';
  document.getElementById('timer-display').textContent = '10:00';
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('timer-wrap').style.display = 'block';
  document.getElementById('progress-row').style.display = 'flex';
  loadQuestion();
  startTimer();
};

loadQuestion();
startTimer();
</script>
</body>
</html>
